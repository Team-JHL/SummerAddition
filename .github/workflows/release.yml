name: Universal Mod Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect build system
        id: detect
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            echo "TYPE=gradle" >> "$GITHUB_OUTPUT"
          elif [ -f "./pom.xml" ]; then
            echo "TYPE=maven" >> "$GITHUB_OUTPUT"
          else
            echo "No supported build system found"
            exit 1
          fi

      - name: Read config
        id: cfg
        shell: bash
        run: |
          set -euo pipefail

          emit() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          emit_ml() {
            {
              printf '%s<<EOF\n' "$1"
              printf '%s\n' "$2"
              printf 'EOF\n'
            } >> "$GITHUB_OUTPUT"
          }

          csv_to_lines() {
            printf '%s' "${1:-}" \
              | tr ',' '\n' \
              | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
              | sed '/^$/d'
          }

          if [ "${{ steps.detect.outputs.TYPE }}" = "gradle" ]; then
            get_prop() {
              grep -m1 "^$1=" gradle.properties 2>/dev/null | cut -d'=' -f2- | tr -d '\r' || true
            }

            get_name() {
              sed -nE "s/^[[:space:]]*rootProject\.name[[:space:]]*=[[:space:]]*['\"]([^'\"]+)['\"].*/\1/p" \
                settings.gradle settings.gradle.kts 2>/dev/null | head -n 1 || true
            }

            NAME="$(get_name)"
            NAME="${NAME:-$(basename "$GITHUB_WORKSPACE")}"

            VERSION="$(get_prop version)"
            JAVA_VERSION="$(get_prop javaVersion)"
            MODRINTH_ID="$(get_prop modrinthId)"
            CURSEFORGE_ID="$(get_prop curseforgeId)"
            LOADERS_RAW="$(get_prop loaders)"
            GAMES_RAW="$(get_prop gameVersions)"
            CHANGELOG_FILE="$(get_prop changelogFile)"

          else
            get_xml() {
              sed -n "s/.*<$1>\(.*\)<\/$1>.*/\1/p" pom.xml | head -n 1 || true
            }

            NAME="$(get_xml artifactId)"
            NAME="${NAME:-$(basename "$GITHUB_WORKSPACE")}"

            VERSION="$(get_xml version)"
            JAVA_VERSION="$(get_xml java.version)"
            MODRINTH_ID="$(get_xml modrinthId)"
            CURSEFORGE_ID="$(get_xml curseforgeId)"
            LOADERS_RAW="$(get_xml loaders)"
            GAMES_RAW="$(get_xml gameVersions)"
            CHANGELOG_FILE="$(get_xml changelogFile)"
          fi

          LOADERS_RAW="${LOADERS_RAW:-forge,fabric,quilt}"
          GAMES_RAW="${GAMES_RAW:-1.20.1,1.20.2,1.20.4,1.21,1.21.1}"
          CHANGELOG_FILE="${CHANGELOG_FILE:-CHANGELOG.md}"
          JAVA_VERSION="${JAVA_VERSION:-21}"

          LOADERS="$(csv_to_lines "$LOADERS_RAW")"
          GAMES="$(csv_to_lines "$GAMES_RAW")"

          if [ -z "${VERSION:-}" ]; then
            echo "VERSION could not be determined"
            exit 1
          fi

          if [ -z "${MODRINTH_ID:-}" ]; then
            echo "MODRINTH_ID could not be determined"
            exit 1
          fi

          if [ -z "${CURSEFORGE_ID:-}" ]; then
            echo "CURSEFORGE_ID could not be determined"
            exit 1
          fi

          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "Changelog file not found: $CHANGELOG_FILE"
            exit 1
          fi

          emit NAME "$NAME"
          emit VERSION "$VERSION"
          emit JAVA_VERSION "$JAVA_VERSION"
          emit MODRINTH_ID "$MODRINTH_ID"
          emit CURSEFORGE_ID "$CURSEFORGE_ID"
          emit_ml LOADERS "$LOADERS"
          emit_ml GAMES "$GAMES"
          emit CHANGELOG_FILE "$CHANGELOG_FILE"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.cfg.outputs.JAVA_VERSION }}
          cache: ${{ steps.detect.outputs.TYPE }}

      - name: Build (Gradle)
        if: steps.detect.outputs.TYPE == 'gradle'
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Build (Maven)
        if: steps.detect.outputs.TYPE == 'maven'
        shell: bash
        run: mvn clean package

      - name: Find JAR
        id: jar
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "build/libs" ]; then
            JAR="$(find build/libs -maxdepth 1 -type f -name '*.jar' \
              ! -name '*-sources.jar' \
              ! -name '*-javadoc.jar' \
              ! -name '*-plain.jar' \
              ! -name '*-original.jar' | head -n 1)"
          else
            JAR="$(find target -maxdepth 1 -type f -name '*.jar' \
              ! -name '*-sources.jar' \
              ! -name '*-javadoc.jar' \
              ! -name 'original-*' | head -n 1)"
          fi

          if [ -z "$JAR" ]; then
            echo "No JAR file found"
            exit 1
          fi

          echo "JAR=$JAR" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          FILE="${{ steps.cfg.outputs.CHANGELOG_FILE }}"

          awk '
            BEGIN { p=0; c=0 }
            /^##[[:space:]]/ {
              c++
              if (c==1) { p=1; next }
              if (c==2) { p=0 }
            }
            p==1 { print }
          ' "$FILE" > latest.md

          {
            echo "MARKDOWN<<EOF"
            cat latest.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "HTML<<EOF"

            in_list=0
            in_sublist=0
            prev_indent=0

            close_sublist() {
              if [ "$in_sublist" -eq 1 ]; then
                echo "    </ul>"
                in_sublist=0
              fi
            }

            close_list() {
              close_sublist
              if [ "$in_list" -eq 1 ]; then
                echo "</li>"
                in_list=0
              fi
            }

            echo "<ul>"

            while IFS= read -r line; do
              [ -z "${line//[[:space:]]/}" ] && continue

              trimmed="$(printf '%s' "$line" | sed 's/^ *//;s/ *$//')"
              indent=$(printf '%s' "$line" | awk '{ match($0, /^[ ]*/); print RLENGTH }')

              if [[ "$trimmed" == "- "* ]]; then
                content="${trimmed#- }"
                content="${content//&/&amp;}"
                content="${content//</&lt;}"
                content="${content//>/&gt;}"

                if [ "$indent" -eq 0 ]; then
                  close_list
                  echo "  <li>$content"
                  in_list=1
                else
                  if [ "$in_sublist" -eq 0 ]; then
                    echo "    <ul>"
                    in_sublist=1
                  fi
                  echo "      <li>$content</li>"
                fi
              fi
            done < latest.md

            close_list
            echo "</ul>"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3
        with:
          files: ${{ steps.jar.outputs.JAR }}

          modrinth-id: ${{ steps.cfg.outputs.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ steps.cfg.outputs.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          name: ${{ steps.cfg.outputs.NAME }} ${{ steps.cfg.outputs.VERSION }}
          version: ${{ steps.cfg.outputs.VERSION }}
          version-type: release

          changelog: ${{ steps.changelog.outputs.HTML }}
          curseforge-changelog: ${{ steps.changelog.outputs.HTML }}

          loaders: ${{ steps.cfg.outputs.LOADERS }}
          game-versions: ${{ steps.cfg.outputs.GAMES }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.cfg.outputs.VERSION }}
          name: ${{ steps.cfg.outputs.NAME }} ${{ steps.cfg.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.MARKDOWN }}
          files: ${{ steps.jar.outputs.JAR }}